services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin
      POSTGRES_DB: app
      PGDATA: /var/lib/postgresql/data
    volumes:
      - app-data:/var/lib/postgresql/data
    ports:
      - 8095:5432

  redis:
    image: redis:7-alpine  # Redis 5.0+ is required for Streams
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass password # no special setup needed for simple messaging


volumes:
  app-data:
  redis-data:
