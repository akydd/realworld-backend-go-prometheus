syntax = "proto3";

option go_package = "realworld-backend-go/api/proto/gen/pb";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service CommentService {
    rpc CreateComment(CreateCommentRequest) returns (CommentResponse) {
        option (google.api.http) = {
            post: "/api/articles/{slug}/comments"
            body: "comment"
        };
    }

    rpc GetComments(GetCommentsRequest) returns (CommentsResponse) {
        option (google.api.http) = {
            get: "/api/articles/{slug}/comments"
        };
    }

    rpc DeleteComment(DeleteCommentRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            delete: "/api/articles/{slug}/comments/{id}"
        };
    }
}

message CreateCommentRequestInner {
    string body = 1;
}

message CreateCommentRequest {
    string slug = 1;
    CreateCommentRequestInner comment = 2;
}

message GetCommentsRequest {
    string slug = 1;
}

message DeleteCommentRequest {
    string slug = 1;
    int64 id = 2;
}

message CommentAuthor {
    string username = 1;
    optional string bio = 2;
    optional string image = 3;
    bool following = 4;
}

message CommentResponseInner {
    int64 id = 1;
    google.protobuf.Timestamp created_at = 2;
    google.protobuf.Timestamp updated_at = 3;
    string body = 4;
    CommentAuthor author = 5;
}

message CommentResponse {
    CommentResponseInner comment = 1;
}

message CommentsResponse {
    repeated CommentResponseInner comments = 1;
}
